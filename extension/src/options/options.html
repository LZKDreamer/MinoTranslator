<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title data-i18n="options.title">Mino 翻译 - 设置</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="options.css" />
</head>
<body>
  <div class="options-container">
    <!-- Header -->
    <header class="options-header">
      <div class="options-brand">
        <img class="options-logo" src="../../icons/logo.svg" alt="Mino" width="28" height="28" />
        <h1 class="options-title" data-i18n="options.title">Mino 翻译 - 设置</h1>
      </div>
      <p class="options-desc" data-i18n="options.description">配置翻译模型、界面语言与字幕显示</p>
    </header>

    <!-- ─── Section 1: Model Configuration ─── -->
    <section class="section" id="section-models">
      <h2 class="section-title" data-i18n="options.modelSection">翻译模型</h2>

      <div class="setting-block">
        <span class="block-label" data-i18n="options.selectModel">选择模型</span>
        <select id="modelSelector" class="setting-select"></select>
      </div>

      <div id="modelFields" class="model-fields-panel">
        <div class="model-field">
          <span class="model-field-label">模型名称</span>
          <input type="text" id="modelName" class="model-input" placeholder="Agnes AI" />
        </div>
        <div class="model-field">
          <span class="model-field-label" data-i18n="options.apiUrl">API 地址</span>
          <input type="text" id="modelApiUrl" class="model-input" placeholder="https://api.example.com/v1" />
        </div>
        <div class="model-field">
          <span class="model-field-label" data-i18n="options.apiKey">API Key</span>
          <div class="input-reveal">
            <input type="password" id="modelApiKey" class="model-input input-reveal-input" placeholder="sk-..." autocomplete="off" />
            <button type="button" class="input-reveal-btn" id="revealApiKey" tabindex="-1" aria-label="Toggle visibility">
              <svg class="reveal-icon" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path class="eye-open" d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle class="eye-open" cx="12" cy="12" r="3"/>
                <path class="eye-closed" d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24" style="display:none"/>
              </svg>
            </button>
          </div>
        </div>
        <div class="model-field">
          <span class="model-field-label" data-i18n="options.modelId">模型 ID</span>
          <input type="text" id="modelModelId" class="model-input" placeholder="model-id" />
        </div>
      </div>

      <div class="model-actions">
        <button id="testModelBtn" class="btn btn-primary btn-sm" data-i18n="options.testBtn">测试连接</button>
        <button id="deleteModelBtn" class="btn btn-danger btn-sm" data-i18n="options.deleteBtn" style="display:none">删除</button>
      </div>

      <button id="addModelBtn" class="btn btn-ghost btn-full" data-i18n="options.addModel">
        + 添加自定义模型
      </button>
    </section>

    <!-- ─── Section 2: Language Settings ─── -->
    <section class="section" id="section-language-settings">
      <h2 class="section-title" data-i18n="options.langSection">语言设置</h2>
      <label class="setting-row">
        <span class="setting-label" data-i18n="options.sourceLanguage">源语言</span>
        <span class="setting-desc" data-i18n="options.sourceAutoDesc">自动识别（根据视频音轨自动检测）</span>
      </label>
      <label class="setting-row">
        <span class="setting-label" data-i18n="options.targetLanguage">目标语言</span>
        <select id="targetLanguage" class="setting-select"></select>
      </label>
    </section>

    <!-- ─── Section 3: UI Language ─── -->
    <section class="section" id="section-language">
      <h2 class="section-title" data-i18n="options.uiLangSection">界面语言</h2>

      <div class="radio-group">
        <label class="radio-row">
          <input type="radio" name="uiLang" value="auto" checked />
          <div class="radio-content">
            <span class="radio-label" data-i18n="options.langAuto">自动检测</span>
            <span class="radio-desc" data-i18n="options.langAutoDesc">跟随浏览器语言（中文 / English）</span>
          </div>
        </label>
        <label class="radio-row">
          <input type="radio" name="uiLang" value="zh-CN" />
          <div class="radio-content">
            <span class="radio-label" data-i18n="options.langChinese">简体中文</span>
          </div>
        </label>
        <label class="radio-row">
          <input type="radio" name="uiLang" value="en" />
          <div class="radio-content">
            <span class="radio-label" data-i18n="options.langEnglish">English</span>
          </div>
        </label>
      </div>
    </section>

    <!-- ─── Section 3: Subtitle Settings ─── -->
    <section class="section" id="section-subtitles">
      <h2 class="section-title" data-i18n="options.subSection">字幕设置</h2>

      <div class="setting-block">
        <span class="block-label" data-i18n="options.subtitleMode">字幕模式</span>
        <div class="segmented-control" role="radiogroup" aria-label="Subtitle mode">
          <label class="segmented-option" data-value="original">
            <input type="radio" name="subtitleMode" value="original" />
            <span data-i18n="options.original">原文</span>
          </label>
          <label class="segmented-option" data-value="bilingual">
            <input type="radio" name="subtitleMode" value="bilingual" checked />
            <span data-i18n="options.bilingual">双语</span>
          </label>
          <label class="segmented-option" data-value="translated">
            <input type="radio" name="subtitleMode" value="translated" />
            <span data-i18n="options.translated">译文</span>
          </label>
        </div>
      </div>

      <!-- Font Size -->
      <div class="setting-block">
        <span class="block-label" data-i18n="options.fontSize">字号</span>
        <div class="segmented-control" role="radiogroup" aria-label="Font size">
          <label class="segmented-option" data-value="small">
            <input type="radio" name="fontSize" value="small" />
            <span data-i18n="options.fontSmall">小</span>
          </label>
          <label class="segmented-option" data-value="medium">
            <input type="radio" name="fontSize" value="medium" checked />
            <span data-i18n="options.fontMedium">中</span>
          </label>
          <label class="segmented-option" data-value="large">
            <input type="radio" name="fontSize" value="large" />
            <span data-i18n="options.fontLarge">大</span>
          </label>
        </div>
      </div>

      <!-- Subtitle Position -->
      <div class="setting-block">
        <span class="block-label" data-i18n="options.subPosition">译文位置</span>
        <div class="segmented-control" role="radiogroup" aria-label="Translation position">
          <label class="segmented-option" data-value="below">
            <input type="radio" name="subPosition" value="below" checked />
            <span data-i18n="options.posBelow">原文下方</span>
          </label>
          <label class="segmented-option" data-value="above">
            <input type="radio" name="subPosition" value="above" />
            <span data-i18n="options.posAbove">原文上方</span>
          </label>
          <label class="segmented-option" data-value="replace">
            <input type="radio" name="subPosition" value="replace" />
            <span data-i18n="options.posReplace">替换原文</span>
          </label>
        </div>
      </div>

      <!-- Background Opacity -->
      <div class="setting-block">
        <span class="block-label" data-i18n="options.bgOpacity">背景透明度</span>
        <div class="slider-row">
          <input type="range" id="bgOpacity" min="0" max="1" step="0.05" value="0.6" />
          <span id="bgOpacityValue" class="slider-value">0.6</span>
        </div>
      </div>

      <!-- Original Text Color -->
      <div class="setting-block">
        <span class="block-label" data-i18n="options.origColor">原文颜色</span>
        <div class="slider-row color-slider-row">
          <input type="range" id="originalTextColor" class="hue-slider" min="0" max="360" value="50" />
        </div>
      </div>

      <!-- Translated Text Color -->
      <div class="setting-block">
        <span class="block-label" data-i18n="options.transColor">译文颜色</span>
        <div class="slider-row color-slider-row">
          <input type="range" id="translatedTextColor" class="hue-slider" min="0" max="360" value="50" />
        </div>
      </div>

      <!-- Subtitle Background Color -->
      <div class="setting-block">
        <span class="block-label" data-i18n="options.bgColor">字幕背景色</span>
        <div class="slider-row color-slider-row">
          <input type="range" id="subBgColor" class="hue-slider" min="0" max="360" value="0" />
        </div>
      </div>
    </section>

    <!-- ─── Section 4: Floating Translate ─── -->
    <section class="section" id="section-floating">
      <h2 class="section-title" data-i18n="options.floatSection">划词翻译</h2>

      <!-- Enable Toggle -->
      <label class="setting-row">
        <span class="setting-label" data-i18n="options.floatingEnable">启用划词翻译</span>
        <div class="toggle-wrapper">
          <input type="checkbox" id="floatingEnable" class="toggle-input" checked />
          <div class="toggle-track">
            <div class="toggle-thumb"></div>
          </div>
        </div>
      </label>

      <!-- Display Position -->
      <div class="setting-block" id="floatPositionBlock">
        <span class="block-label" data-i18n="options.floatPosition">显示位置</span>
        <div class="segmented-control" role="radiogroup" aria-label="Floating translate position">
          <label class="segmented-option" data-value="mouse">
            <input type="radio" name="floatPosition" value="mouse" checked />
            <span data-i18n="options.posMouse">跟随鼠标</span>
          </label>
          <label class="segmented-option" data-value="fixed">
            <input type="radio" name="floatPosition" value="fixed" />
            <span data-i18n="options.posFixed">固定右下角</span>
          </label>
        </div>
      </div>
    </section>

    <!-- ─── Section 6: Data Management ─── -->
    <section class="section section-data" id="section-data">
      <h2 class="section-title" data-i18n="options.dataSection">数据管理</h2>
      <div class="data-mgmt">
        <p class="data-desc" data-i18n="options.clearCacheDesc">清除所有已缓存的字幕翻译数据。下次翻译时将从 AI 模型重新获取译文。</p>
        <button id="clearCacheBtn" class="btn btn-ghost btn-full" data-i18n="options.clearCacheBtn">清除字幕缓存</button>
      </div>
    </section>

    <!-- ─── Section 7: About ─── -->
    <section class="section section-about" id="section-about">
      <h2 class="section-title" data-i18n="options.aboutSection">关于</h2>
      <div class="about-info">
        <span class="about-label" data-i18n="options.version">版本</span>
        <span class="about-value" id="versionDisplay">1.0.0</span>
      </div>
    </section>
  </div>
  <div id="toast" class="toast" hidden></div>

  <script src="/src/shared/crypto-utils.js"></script>
  <script src="/src/shared/constants.js"></script>
  <script src="options.js"></script>
</body>
</html>
