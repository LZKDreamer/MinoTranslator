<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div id="app" class="popup-container">
    <!-- Header -->
    <div class="popup-header">
      <span class="popup-title" data-i18n="popup.title">翻译插件</span>
    </div>

    <!-- Translation Toggle -->
    <label class="setting-row">
      <span class="setting-label" data-i18n="popup.translationToggle">翻译</span>
      <div class="toggle-wrapper">
        <input type="checkbox" id="translationToggle" class="toggle-input" checked />
        <div class="toggle-track">
          <div class="toggle-thumb"></div>
        </div>
      </div>
    </label>

    <!-- Separator -->
    <div class="separator"></div>

    <!-- Subtitle Mode -->
    <div class="setting-group">
      <span class="setting-label" data-i18n="popup.subtitleMode">字幕模式</span>
      <div class="segmented-control" role="radiogroup" aria-label="Subtitle mode">
        <label class="segmented-option" data-value="original">
          <input type="radio" name="subtitleMode" value="original" />
          <span data-i18n="popup.original">原文</span>
        </label>
        <label class="segmented-option" data-value="bilingual">
          <input type="radio" name="subtitleMode" value="bilingual" checked />
          <span data-i18n="popup.bilingual">双语</span>
        </label>
        <label class="segmented-option" data-value="translated">
          <input type="radio" name="subtitleMode" value="translated" />
          <span data-i18n="popup.translated">译文</span>
        </label>
      </div>
    </div>

    <!-- Target Language -->
    <label class="setting-row">
      <span class="setting-label" data-i18n="popup.targetLanguage">目标语言</span>
      <div class="select-wrapper">
        <select id="targetLanguage">
          <option value="zh-CN" data-i18n="popup.chinese">简体中文</option>
          <option value="en" data-i18n="popup.english">English</option>
        </select>
        <svg class="select-chevron" width="12" height="12" viewBox="0 0 12 12" fill="none">
          <path d="M3 5L6 8L9 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
    </label>

    <!-- Separator -->
    <div class="separator"></div>

    <!-- Floating Translate Toggle -->
    <label class="setting-row">
      <span class="setting-label" data-i18n="popup.floatingTranslate">划词翻译</span>
      <div class="toggle-wrapper">
        <input type="checkbox" id="floatingToggle" class="toggle-input" checked />
        <div class="toggle-track">
          <div class="toggle-thumb"></div>
        </div>
      </div>
    </label>

    <!-- Footer -->
    <a href="#" id="openSettings" class="settings-link" data-i18n="popup.openSettings">
      打开完整设置
    </a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
